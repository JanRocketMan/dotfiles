set -g prefix ^S
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status off                # disable status bar at the bottom
setw -g mode-keys vi
# Make sure tmux does not intercept Alt-b anywhere
unbind -n M-b
# And explicitly forward Alt-b to the app (bash/readline or fish)
bind -n M-b send-keys M-b
bind-key -n M-p set-option -g status # toggle status bar by Alt+p combo 
bind-key -n M-s copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind -n M-Tab next
bind -n M-Space prev

bind -n M-h run-shell "bash ~/.tmux_split.sh vertical"
bind -n M-v run-shell "bash ~/.tmux_split.sh horizontal"
bind -n M-c run-shell "bash ~/.tmux_new_window.sh"
bind-key -n M-a command-prompt -p "Rename window to:" -I "#W" "rename-window '%%'"
bind -n M-x kill-pane
bind -n M-d detach
set -g mouse on
bind -n BTab select-pane -t :.+
set -g default-terminal "screen-256color" # for correct theme in nvim
set-option -a terminal-overrides ',xterm-256color:Tc'

# add support for image preview via yazi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
# forward modified keys (e.g. Shift+Enter) to apps inside tmux
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

run-shell 'echo "Config reloaded"'

